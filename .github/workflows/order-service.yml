name: Order Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/order-service/**"
      - ".github/workflows/order-service.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/order-service/**"
      - ".github/workflows/order-service.yml"

defaults:
  run:
    working-directory: services/order-service

jobs:
  # ─── LINT JOB ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/order-service/go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/order-service

  # ─── TEST JOB ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: order_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      kafka:
        image: confluentinc/cp-kafka:7.5.0
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/order-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -count=1 -race -timeout 120s
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/order_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BROKERS: localhost:9092
          LOG_LEVEL: error

  # ─── DOCKER BUILD JOB ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/order-service
          push: false
          tags: order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
