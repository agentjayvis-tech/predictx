name: Wallet Service CI

on:
  push:
    branches: [main, develop]
    paths:
      - "services/wallet-service/**"
      - ".github/workflows/wallet-service.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "services/wallet-service/**"
      - ".github/workflows/wallet-service.yml"

defaults:
  run:
    working-directory: services/wallet-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/wallet-service/go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/wallet-service

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: wallet_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/wallet-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -count=1 -race -timeout 120s
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/wallet_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BROKERS: localhost:9092
          LOG_LEVEL: error

  docker:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/wallet-service
          push: false
          tags: wallet-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
