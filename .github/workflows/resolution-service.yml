name: Resolution Service CI

# Only runs when resolution service files change
on:
  push:
    branches: [main, develop]
    paths:
      - 'services/resolution-service/**'
      - '.github/workflows/resolution-service.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/resolution-service/**'
      - '.github/workflows/resolution-service.yml'

defaults:
  run:
    working-directory: services/resolution-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff
        run: ruff check resolution_service/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: predictx_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/predictx_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      ANTHROPIC_API_KEY: test-key-not-used-in-unit-tests
      API_FOOTBALL_KEY: test-key
      OPENWEATHERMAP_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    # Only build image on push to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — registry not configured yet)
        uses: docker/build-push-action@v5
        with:
          context: services/resolution-service
          push: false
          tags: predictx/resolution-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
