name: settlement-service

on:
  push:
    branches: [main]
    paths:
      - 'services/settlement-service/**'
      - '.github/workflows/settlement-service.yml'
  pull_request:
    paths:
      - 'services/settlement-service/**'
      - '.github/workflows/settlement-service.yml'

defaults:
  run:
    working-directory: services/settlement-service

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          working-directory: services/settlement-service

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: settlement_user
          POSTGRES_PASSWORD: settlement_pass
          POSTGRES_DB: settlement_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run unit tests (no external dependencies)
        run: go test -v -race ./internal/domain/... ./internal/service/... ./internal/api/http/...

      - name: Build binary
        run: go build ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/settlement-service
          push: false
          tags: predictx/settlement-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
